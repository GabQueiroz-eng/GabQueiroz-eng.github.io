<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />

  <title>ERQ Construções — Shaping Visions Into Reality</title>
  <meta name="description" content="ERQ Construções specializes in turning raw concrete and bold blueprints into structural masterpieces. Move your cursor to see the transformation." />

  <!-- React 18 (UMD) + Babel for in-browser JSX -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style type="text/tailwindcss">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:ital,wght@0,400;0,600;0,700;1,600&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .font-montserrat { font-family: 'Montserrat', sans-serif; }

    @keyframes heroReveal { 0%{opacity:0;transform:translateY(30px);filter:blur(10px)} 100%{opacity:1;transform:translateY(0);filter:blur(0)} }
    @keyframes heroFadeUp { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes heroZoom { 0%{transform:scale(1.08)} 100%{transform:scale(1)} }
    .hero-anim { opacity:0; animation-fill-mode:forwards; animation-timing-function:cubic-bezier(0.2, 0.8, 0.2, 1); }
    .hero-reveal { animation-name:heroReveal; animation-duration:1.2s; }
    .hero-fade { animation-name:heroFadeUp; animation-duration:1s; }
    .hero-zoom { animation:heroZoom 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @media (prefers-reduced-motion: reduce){ .hero-anim,.hero-zoom{ animation:none; opacity:1; } }

    html, body, #root { margin:0; height:100%; background:#171717; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ── Assets (stock placeholders) ────────────────────────────────────────────
    const BEFORE_IMAGE = "https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=2070&q=80"; // raw construction site
    const AFTER_IMAGE  = "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=2070&q=80"; // finished modern building

    const SPOTLIGHT_R = 300;

    // ── Reveal layer: canvas-masked "After" image following the cursor ─────────
    function RevealLayer({ image, cursorX, cursorY }) {
      const canvasRef = useRef(null);
      const divRef = useRef(null);

      // Keep the canvas matched to the viewport.
      useEffect(() => {
        const resize = () => {
          const c = canvasRef.current;
          if (!c) return;
          c.width = window.innerWidth;
          c.height = window.innerHeight;
        };
        resize();
        window.addEventListener("resize", resize);
        return () => window.removeEventListener("resize", resize);
      }, []);

      // Redraw the soft circular mask every time the cursor moves.
      useEffect(() => {
        const c = canvasRef.current;
        const div = divRef.current;
        if (!c || !div) return;
        const ctx = c.getContext("2d");
        if (!ctx) return;

        ctx.clearRect(0, 0, c.width, c.height);

        const grad = ctx.createRadialGradient(cursorX, cursorY, 0, cursorX, cursorY, SPOTLIGHT_R);
        grad.addColorStop(0,    "rgba(255,255,255,1)");
        grad.addColorStop(0.4,  "rgba(255,255,255,1)");
        grad.addColorStop(0.6,  "rgba(255,255,255,0.8)");
        grad.addColorStop(0.75, "rgba(255,255,255,0.4)");
        grad.addColorStop(0.88, "rgba(255,255,255,0.1)");
        grad.addColorStop(1,    "rgba(255,255,255,0)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cursorX, cursorY, SPOTLIGHT_R, 0, Math.PI * 2);
        ctx.fill();

        const url = c.toDataURL();
        div.style.maskImage = `url(${url})`;
        div.style.webkitMaskImage = `url(${url})`;
        div.style.maskSize = "100% 100%";
        div.style.webkitMaskSize = "100% 100%";
        div.style.maskRepeat = "no-repeat";
        div.style.webkitMaskRepeat = "no-repeat";
      });

      return (
        <React.Fragment>
          <canvas
            ref={canvasRef}
            className="absolute inset-0 pointer-events-none"
            style={{ display: "none" }}
          />
          <div
            ref={divRef}
            className="absolute inset-0 bg-center bg-cover bg-no-repeat z-30 pointer-events-none"
            style={{ backgroundImage: `url(${image})` }}
          />
        </React.Fragment>
      );
    }

    // ── Navigation ─────────────────────────────────────────────────────────────
    function Nav() {
      const navBtns = ["Services", "Engineering", "About Us", "Contact"];
      return (
        <nav className="fixed top-0 left-0 right-0 z-[100] flex items-center justify-between p-5 md:px-10 border-b border-white/10 bg-gradient-to-b from-black/60 to-transparent pointer-events-auto">
          {/* Left: logo + wordmark */}
          <div className="flex items-center gap-3">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M3 21V8l7-4 7 4v4h4v9h-7v-5H10v5H3zm2-2h3v-4h2v4h3V9.2L10 6.3 5 9.2V19zm12 0h2v-5h-2v5z"/>
            </svg>
            <span className="text-white text-xl font-montserrat font-bold tracking-wide">ERQ CONSTRUÇÕES</span>
          </div>

          {/* Center pill */}
          <div className="hidden md:flex absolute left-1/2 -translate-x-1/2 bg-black/30 backdrop-blur-md border border-white/20 rounded-full px-2 py-2 items-center gap-1">
            <button className="bg-white text-black px-5 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider transition-colors">Portfolio</button>
            {navBtns.map((b) => (
              <button key={b} className="text-white/70 hover:bg-white/10 hover:text-white transition-colors px-5 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider">{b}</button>
            ))}
          </div>

          {/* Right: desktop quote + mobile hamburger */}
          <button className="hidden md:block bg-transparent border border-white text-white text-xs uppercase tracking-wider font-bold px-6 py-2.5 hover:bg-white hover:text-black transition-colors">Get a Quote</button>
          <button className="md:hidden text-white p-1" aria-label="Open menu">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </nav>
      );
    }

    // ── App ─────────────────────────────────────────────────────────────────────
    function App() {
      const [cursorPos, setCursorPos] = useState({ x: -999, y: -999 });
      const mouse = useRef({ x: -999, y: -999 });
      const smooth = useRef({ x: -999, y: -999 });
      const rafRef = useRef(null);

      useEffect(() => {
        const onMove = (e) => {
          mouse.current.x = e.clientX;
          mouse.current.y = e.clientY;
        };
        window.addEventListener("mousemove", onMove);

        const loop = () => {
          smooth.current.x += (mouse.current.x - smooth.current.x) * 0.12;
          smooth.current.y += (mouse.current.y - smooth.current.y) * 0.12;
          setCursorPos({ x: smooth.current.x, y: smooth.current.y });
          rafRef.current = requestAnimationFrame(loop);
        };
        rafRef.current = requestAnimationFrame(loop);

        return () => {
          window.removeEventListener("mousemove", onMove);
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, []);

      return (
        <div className="min-h-screen bg-neutral-900 tracking-[-0.02em]" style={{ fontFamily: "'Inter', sans-serif" }}>
          <Nav />

          <section className="relative w-full overflow-hidden h-screen bg-black" style={{ height: "100dvh" }}>
            {/* 1. Base image (Before) */}
            <div
              className="absolute inset-0 bg-center bg-cover bg-no-repeat grayscale-[30%] z-10 hero-zoom"
              style={{ backgroundImage: `url(${BEFORE_IMAGE})` }}
            />

            {/* 2. Reveal layer (After) */}
            <RevealLayer image={AFTER_IMAGE} cursorX={cursorPos.x} cursorY={cursorPos.y} />

            {/* 3. Heading */}
            <div className="absolute top-[18%] left-0 right-0 flex flex-col items-center text-center px-5 pointer-events-none z-50">
              <h1 className="text-white leading-[0.95] drop-shadow-lg">
                <span className="block font-montserrat font-bold text-5xl sm:text-7xl md:text-8xl uppercase tracking-tight hero-anim hero-reveal" style={{ animationDelay: "0.3s" }}>
                  SHAPING VISIONS
                </span>
                <span className="block font-montserrat font-light text-4xl sm:text-6xl md:text-7xl mt-2 text-white/90 hero-anim hero-reveal" style={{ animationDelay: "0.5s" }}>
                  INTO REALITY
                </span>
              </h1>
            </div>

            {/* 4. Bottom-left paragraph */}
            <div className="hidden sm:block absolute bottom-14 left-10 md:left-14 max-w-[300px] bg-black/40 p-4 backdrop-blur-sm border-l-2 border-[#d2611f] z-50 hero-anim hero-fade" style={{ animationDelay: "0.8s" }}>
              <p className="text-sm text-white/90 leading-relaxed">
                Established in June 2024, ERQ Construções specializes in turning raw concrete and bold blueprints into structural masterpieces. Move your cursor to see the transformation.
              </p>
            </div>

            {/* 5. Bottom-right block */}
            <div className="absolute bottom-10 sm:bottom-14 left-5 right-5 sm:left-auto sm:right-10 md:right-14 max-w-full sm:max-w-[260px] flex flex-col items-start gap-4 sm:gap-5 z-50 hero-anim hero-fade" style={{ animationDelay: "1.0s" }}>
              <button className="bg-[#d2611f] hover:bg-[#e8702a] text-white text-sm font-bold uppercase tracking-wider px-8 py-4 rounded-none transition-all hover:scale-[1.02] active:scale-95 shadow-lg">
                Start Project
              </button>
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
