    // ─────────────────────────── Hooks
    function useReveal() {
      useEffect(() => {
        if (typeof IntersectionObserver === 'undefined') {
          document.querySelectorAll('.reveal, .reveal-scale, .stagger').forEach(el => el.classList.add('in'));
          return;
        }
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
          });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal, .reveal-scale, .stagger').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

    function useInView(threshold = 0.4) {
      const ref = useRef(null);
      const [seen, setSeen] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { setSeen(true); io.disconnect(); } });
        }, { threshold });
        io.observe(el);
        return () => io.disconnect();
      }, [threshold]);
      return [ref, seen];
    }

    // ─────────────────────────── Building blocks
    function AnimatedNumber({ to, suffix='', duration=1700 }) {
      const [ref, seen] = useInView(0.5);
      const [val, setVal] = useState(0);
      useEffect(() => {
        if (!seen) return;
        let raf, start = null;
        const step = (ts) => {
          if (start == null) start = ts;
          const p = Math.min(1, (ts - start) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(to * eased));
          if (p < 1) raf = requestAnimationFrame(step);
        };
        raf = requestAnimationFrame(step);
        return () => cancelAnimationFrame(raf);
      }, [seen, to, duration]);
      return <span ref={ref}>{val.toLocaleString('pt-BR')}{suffix}</span>;
    }

    function SmileSvg({ variant }) {
      const after = variant === 'after';
      const toothFill = after ? '#ffffff' : '#f0e6c8';
      const lipsTop = after ? '#c46479' : '#a64d62';
      return (
        <svg viewBox="0 0 600 600" className="w-full h-full" aria-hidden="true">
          <defs>
            <radialGradient id={`bg-${variant}`} cx=".5" cy=".5" r=".6">
              <stop offset="0%" stopColor={after ? '#e8f4ff' : '#fbeede'}/>
              <stop offset="100%" stopColor={after ? '#bedbf5' : '#dbb88f'}/>
            </radialGradient>
          </defs>
          <rect width="600" height="600" fill={`url(#bg-${variant})`}/>
          {/* Face hint */}
          <ellipse cx="300" cy="320" rx="220" ry="240" fill={after ? '#ffd9c1' : '#f0b793'} opacity=".6"/>
          {/* Mouth */}
          <path d={after
            ? 'M150 320 Q300 220 450 320 Q300 480 150 320 Z'
            : 'M160 330 Q300 240 440 330 Q300 460 160 330 Z'}
            fill="#3a1b22" />
          {/* Upper lip */}
          <path d={after
            ? 'M150 320 Q300 240 450 320 Q300 280 150 320 Z'
            : 'M160 330 Q300 250 440 330 Q300 290 160 330 Z'}
            fill={lipsTop}/>
          {/* Lower lip */}
          <path d={after
            ? 'M150 320 Q300 480 450 320 Q300 420 150 320 Z'
            : 'M160 330 Q300 460 440 330 Q300 410 160 330 Z'}
            fill={after ? '#d97a90' : '#b7637d'} opacity=".85"/>
          {/* Teeth row */}
          {(() => {
            const teeth = [];
            const count = 10;
            const startX = after ? 180 : 185;
            const endX   = after ? 420 : 415;
            const width = (endX - startX) / count;
            for (let k = 0; k < count; k++) {
              const x = startX + k * width;
              const offY = after ? 0 : (k % 2 === 0 ? -2 : 3);
              const w    = after ? width - 3 : width - (k % 3 === 0 ? 5 : 2);
              teeth.push(
                <rect key={k}
                  x={x} y={310 + offY} width={w} height={28}
                  rx="4" ry="4"
                  fill={toothFill}
                  stroke={after ? '#dde9f6' : '#c9a87a'} strokeWidth="1"/>
              );
            }
            return teeth;
          })()}
          {/* Highlight */}
          {after && <ellipse cx="260" cy="320" rx="60" ry="6" fill="rgba(255,255,255,.65)"/>}
        </svg>
      );
    }

    function BeforeAfter() {
      const [pct, setPct] = useState(50);
      const [touched, setTouched] = useState(false);
      const wrapRef = useRef(null);
      const dragging = useRef(false);

      const setFromClient = (clientX) => {
        const el = wrapRef.current; if (!el) return;
        const r = el.getBoundingClientRect();
        const p = ((clientX - r.left) / r.width) * 100;
        setPct(Math.max(0, Math.min(100, p)));
      };

      const onDown  = (e) => { dragging.current = true; setTouched(true); setFromClient(e.touches ? e.touches[0].clientX : e.clientX); };
      const onMove  = (e) => { if (!dragging.current) return; setFromClient(e.touches ? e.touches[0].clientX : e.clientX); };
      const onUp    = () => { dragging.current = false; };

      useEffect(() => {
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
        window.addEventListener('touchmove', onMove);
        window.addEventListener('touchend',  onUp);
        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend',  onUp);
        };
      }, []);

      return (
        <section id="antes-depois" className="section-y bg-mist relative overflow-hidden">

  <script>
